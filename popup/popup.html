<!doctype html>

<!-- TODO all styles to popup.css -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Work with URLs</title>
    <meta name="author" content="Carlos A Molina" />
    <meta name="description" content="Pop-up of the addon." />
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <div id="popup-content">
      <div>
        <p>URLs</p>
        <div class="section">
          <textarea
            id="inputUrls"
            class="input"
            type="text"
            rows="4"
          ></textarea>
        </div>
      </div>
      <div class="oneLineButtons section">
        <input
          id="buttonShowConfig"
          alt="Configuration"
          title="Configuration"
          type="image"
          class="mainButton"
          src="/icons/configuration.svg"
        />
        <input
          id="buttonCopy"
          alt="Copy to clipboard"
          title="Copy to clipboard"
          type="image"
          class="mainButton"
          src="/icons/copy.svg"
        />
        <input
          id="buttonCleanUrl"
          alt="Clean URLs"
          title="Clean URLs"
          type="image"
          class="mainButton"
          src="/icons/cleanUrl.svg"
        />
        <input
          id="buttonObfuscate"
          alt="Obfuscate"
          title="Obfuscate"
          type="image"
          class="mainButton"
          src="/icons/obfuscate.svg"
        />
        <input
          id="buttonOpenUrls"
          alt="Open Urls"
          title="Open Urls"
          type="image"
          class="mainButton"
          src="/icons/globe.svg"
        />
      </div>
      <div id="menuConfig" class="menuConfig section backGroundGrey hidden">
        <div class="configOpenAllPaths">
          <button id="buttonOpenPaths" class="buttonOnOff">
            <div>off</div>
          </button>
          <p>Open all paths</p>
        </div>
        <div class="configDecodeUrls section">
          <button id="buttonDecodeUrls" class="buttonOnOff">
            <div>off</div>
          </button>
          <p>Decode URLs</p>
        </div>
        <div class="section">
          <button id="buttonConfigLazyLoading" class="buttonNew">
            Lazy loading configuration
          </button>
          <div id="menuLazyLoading" class="section hidden">
            <p>Wait time between opening each tab (milliseconds, integer)</p>
            <div class="lazyLoadingConfig section">
              <input
                id="inputLazyLoading"
                class="inputLazyLoading"
                type="text"
              />
              <button
                id="buttonAddLazyLoading"
                title="Update"
                class="buttonNew updateButton"
              >
                <img src="/icons/ok.svg" />
              </button>
            </div>
          </div>
        </div>
        <div class="section">
          <button id="buttonConfigRules" class="buttonNew">
            Rules configuration
          </button>
        </div>
        <div id="menuRules" class="section">
          <fieldset>
            <legend>
              Select the type of rule (regular expressions) to configure:
            </legend>
            <div>
              <input
                id="buttonInputDeobfuscation"
                type="radio"
                name="ruleType"
              />
              <label>Deobfuscation</label>
            </div>
            <div>
              <input id="buttonInputObfuscation" type="radio" name="ruleType" />
              <label>Obfuscation</label>
            </div>
          </fieldset>
          <div id="menuRulesConfiguration" class="hidden">
            <div class="configOpenRules section">
              <button id="buttonOpenRules" class="buttonOnOff">
                <div>off</div>
              </button>
              <p>Save more than one rule</p>
            </div>
            <div id="divInputRule">
              <div class="section">
                <p>Value to change</p>
              </div>
              <div class="section">
                <input
                  id="inputValueOld"
                  class="input"
                  type="text"
                  rows="1"
                />
              </div>
              <div class="section">
                <p>New value</p>
              </div>
              <div class="section">
                <input
                  id="inputValueNew"
                  class="input"
                  type="text"
                  rows="1"
                />
              </div>
            </div>
            <div id="divInputRules">
              <div class="section">
                <p id="pInputRules">
                  Value to change (line i). New value (line i+1)
                </p>
              </div>
              <div class="section">
                <textarea
                  id="inputRules"
                  class="input"
                  type="text"
                  rows="5"
                ></textarea>
              </div>
            </div>
            <div class="oneLineButtons section">
              <button id="buttonAddRule" class="buttonNew">Add</button>
              <button id="buttonClearAllRules" class="buttonNew">
                Delete stored rules
              </button>
            </div>
            <div class="info-container"></div>
          </div>
        </div>
      </div>
    </div>
    <div id="error-content" class="section hidden">
      <p>Cannot work on this web page.</p>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
